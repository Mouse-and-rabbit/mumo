<!DOCTYPE html>
<html>
<head>
  <title>MUMO</title>
</head>
<body>

<h1>🔥 MUMO WORKING</h1>

<input id="q" placeholder="Enter protein">
<button onclick="search()">Search</button>

<p id="result"></p>

<script>
function search() {
  let q = document.getElementById("q").value;
  document.getElementById("result").innerText = "Searching: " + q;
}
</script>

</body>
</html>
